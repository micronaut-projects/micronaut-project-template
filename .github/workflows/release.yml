# WARNING: Do not edit this file directly. Instead, go to:
#
# https://github.com/micronaut-projects/micronaut-project-template/tree/master/.github/workflows
#
# and edit them there. Note that it will be sync'ed to all the Micronaut repos
name: Release
on:
  release:
    types: [published]
jobs:
  release:
    outputs:
      artifacts-sha256: ${{ steps.hash.outputs.artifacts-sha256 }} # Computed hashes for build artifacts.
    runs-on: ubuntu-latest
    steps:
      - name: Remove system JDKs
        run: |
          sudo rm -rf /usr/lib/jvm/*
          unset JAVA_HOME
          export PATH=$(echo "$PATH" | tr ':' '\n' | grep -v '/usr/lib/jvm' | paste -sd:)
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: |
            25
      - name: Set the current release version
        id: release_version
        run: echo "release_version=${GITHUB_REF:11}" >> $GITHUB_OUTPUT
      - name: Run pre-release
        uses: micronaut-projects/github-actions/pre-release@300bf6db7c062dcba77c90bb90e475df31b2acab # master
        env:
          MICRONAUT_BUILD_EMAIL: ${{ secrets.MICRONAUT_BUILD_EMAIL }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to Sonatype OSSRH
        id: publish
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSWORD: ${{ secrets.GPG_PASSWORD }}
          GPG_FILE: ${{ secrets.GPG_FILE }}
          DEVELOCITY_ACCESS_KEY: ${{ secrets.GRADLE_ENTERPRISE_ACCESS_KEY }}
          DEVELOCITY_CACHE_USERNAME: ${{ secrets.GRADLE_ENTERPRISE_CACHE_USERNAME }}
          DEVELOCITY_CACHE_PASSWORD: ${{ secrets.GRADLE_ENTERPRISE_CACHE_PASSWORD }}
        run: |
          echo $GPG_FILE | base64 -d > secring.gpg
          # Publish both locally and to Sonatype.
          # The artifacts stored locally will be used to generate the SLSA provenance.
          ./gradlew publishToMavenCentral --publishing-type=AUTOMATIC
          # Read the current version from gradle.properties.
          VERSION=$(./gradlew properties | grep 'version:' | awk '{print $2}')
          # Read the project group from gradle.properties.
          GROUP_PATH=$(./gradlew properties| grep "projectGroup" | awk '{print $2}' | sed 's/\./\//g')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "group=$GROUP_PATH" >> "$GITHUB_OUTPUT"
      - name: Generate subject
        id: hash
        run: |
          # Find all files in the local publication repository.
          cd build/repo
          mapfile -d '' ARTIFACTS < <(find . -type f -printf '%P\0' | sort -z)
          if [[ ${#ARTIFACTS[@]} -eq 0 ]]; then
            echo "No publication artifacts found" >&2
            exit 1
          fi
          # Compute the hashes for the publication artifacts.
          HASHES=$(sha256sum -- "${ARTIFACTS[@]}" | base64 -w0)
          cd ../..
          # Set the hash as job output for debugging.
          echo "artifacts-sha256=$HASHES" >> "$GITHUB_OUTPUT"
          # Store the hash in a file, which is uploaded as a workflow artifact.
          echo -n "$HASHES" > artifacts-sha256
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gradle-build-outputs
          path: build/repo
          retention-days: 5
      - name: Upload artifacts-sha256
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts-sha256
          path: artifacts-sha256
          retention-days: 5
      - name: Generate docs
        run: ./gradlew docs
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.GRADLE_ENTERPRISE_ACCESS_KEY }}
          DEVELOCITY_CACHE_USERNAME: ${{ secrets.GRADLE_ENTERPRISE_CACHE_USERNAME }}
          DEVELOCITY_CACHE_PASSWORD: ${{ secrets.GRADLE_ENTERPRISE_CACHE_PASSWORD }}
          GH_TOKEN_PUBLIC_REPOS_READONLY: ${{ secrets.GH_TOKEN_PUBLIC_REPOS_READONLY }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
      - name: Export Gradle Properties
        uses: micronaut-projects/github-actions/export-gradle-properties@300bf6db7c062dcba77c90bb90e475df31b2acab # master
      - name: LATEST_TAG
        run: |
          echo "LATEST_TAG=$(curl -s -L -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name')" >> $GITHUB_ENV
      - name: Publish to Github Pages
        if: success()
        uses: micronaut-projects/github-pages-deploy-action@76d63aafbab7108d74e83be4e5b3b0501382e829 # master
        env:
          BETA: ${{ !(github.event.release.tag_name == env.LATEST_TAG) || github.event.release.draft || github.event.release.prerelease || contains(steps.release_version.outputs.release_version, 'M') || contains(steps.release_version.outputs.release_version, 'RC') }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          BRANCH: gh-pages
          FOLDER: build/docs
          VERSION: ${{ steps.release_version.outputs.release_version }}
          TARGET_REPOSITORY: ${{ github.repository == 'micronaut-projects/micronaut-core' && env.docsRepository || github.repository }}
          DEVELOCITY_ACCESS_KEY: ${{ secrets.GRADLE_ENTERPRISE_ACCESS_KEY }}
          DEVELOCITY_CACHE_USERNAME: ${{ secrets.GRADLE_ENTERPRISE_CACHE_USERNAME }}
          DEVELOCITY_CACHE_PASSWORD: ${{ secrets.GRADLE_ENTERPRISE_CACHE_PASSWORD }}
      - name: Run post-release
        if: success()
        uses: micronaut-projects/github-actions/post-release@300bf6db7c062dcba77c90bb90e475df31b2acab # master
        env:
          MICRONAUT_BUILD_EMAIL: ${{ secrets.MICRONAUT_BUILD_EMAIL }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  provenance-subject:
    needs: [release]
    runs-on: ubuntu-latest
    outputs:
      artifacts-sha256: ${{ steps.set-hash.outputs.artifacts-sha256 }}
    steps:
      - name: Download artifacts-sha256
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: artifacts-sha256
      # The SLSA provenance generator expects the hash digest of artifacts to be passed as a job
      # output. So we need to download the artifacts-sha256 and set it as job output. The hash of
      # the artifacts should be set as output directly in the release job. But due to a known bug
      # in GitHub Actions we have to use a workaround.
      # See https://github.com/community/community/discussions/37942.
      - name: Set artifacts-sha256 as output
        id: set-hash
        shell: bash
        run: echo "artifacts-sha256=$(cat artifacts-sha256)" >> "$GITHUB_OUTPUT"

  provenance:
    needs: [release, provenance-subject]
    permissions:
      actions: read # To read the workflow path.
      id-token: write # To sign the provenance.
      contents: write # To add assets to a release.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: "${{ needs.provenance-subject.outputs.artifacts-sha256 }}"
      upload-assets: true # Upload to a new release.
      compile-generator: true # Build the generator from source.

  github_release:
    needs: [release, provenance]
    permissions:
      contents: write # To add assets to a release.
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: gradle-build-outputs
          path: build/repo
      - name: Create artifacts archive
        shell: bash
        run: |
          cd build/repo
          find . -type f -printf '%P\n' | sort | zip -q -@ ../../artifacts.zip
      - name: Upload assets
        # Upload the artifacts to the existing release. Note that the SLSA provenance will
        # attest to each artifact file and not the aggregated ZIP file.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: artifacts.zip
