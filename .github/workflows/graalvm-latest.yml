# WARNING: Do not edit this file directly. Instead, go to:
#
# https://github.com/micronaut-projects/micronaut-project-template/tree/master/.github/workflows
#
# and edit them there. Note that it will be sync'ed to all the Micronaut repos
name: GraalVM Latest CI
on:
  push:
    branches:
      - master
      - '[0-9]+.[0-9]+.x'
  pull_request:
    branches:
      - master
      - '[0-9]+.[0-9]+.x'
jobs:
  build_matrix:
    if: github.repository != 'micronaut-projects/micronaut-project-template'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Build Matrix
        uses: micronaut-projects/github-actions/graalvm/build-matrix@e8cc2858e07f25cd86910b691ad09eb0d7f07f56 # master
        id: build-matrix
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.GRADLE_ENTERPRISE_ACCESS_KEY }}
          DEVELOCITY_CACHE_USERNAME: ${{ secrets.GRADLE_ENTERPRISE_CACHE_USERNAME }}
          DEVELOCITY_CACHE_PASSWORD: ${{ secrets.GRADLE_ENTERPRISE_CACHE_PASSWORD }}
        with:
          java-version: '25'
  build:
    needs: build_matrix
    if: github.repository != 'micronaut-projects/micronaut-project-template'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 6
      matrix:
        java: ['25']
        native_test_task: ${{ fromJson(needs.build_matrix.outputs.matrix).native_test_task }}
    steps:
      - name: Remove system JDKs
        run: |
          sudo rm -rf /usr/lib/jvm/*
          unset JAVA_HOME
          export PATH=$(echo "$PATH" | tr ':' '\n' | grep -v '/usr/lib/jvm' | paste -sd:)
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Pre-Build Steps
        uses: micronaut-projects/github-actions/graalvm/pre-build@e8cc2858e07f25cd86910b691ad09eb0d7f07f56 # master
        id: pre-build
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.GRADLE_ENTERPRISE_ACCESS_KEY }}
          DEVELOCITY_CACHE_USERNAME: ${{ secrets.GRADLE_ENTERPRISE_CACHE_USERNAME }}
          DEVELOCITY_CACHE_PASSWORD: ${{ secrets.GRADLE_ENTERPRISE_CACHE_PASSWORD }}
        with:
          distribution: 'graalvm'
          gradle-java: '25'
          java: ${{ matrix.java }}
          nativeTestTask: ${{ matrix.native_test_task }}
      - name: Build Steps
        uses: micronaut-projects/github-actions/graalvm/build@e8cc2858e07f25cd86910b691ad09eb0d7f07f56 # master
        id: build
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.GRADLE_ENTERPRISE_ACCESS_KEY }}
          DEVELOCITY_CACHE_USERNAME: ${{ secrets.GRADLE_ENTERPRISE_CACHE_USERNAME }}
          DEVELOCITY_CACHE_PASSWORD: ${{ secrets.GRADLE_ENTERPRISE_CACHE_PASSWORD }}
          GH_TOKEN_PUBLIC_REPOS_READONLY: ${{ secrets.GH_TOKEN_PUBLIC_REPOS_READONLY }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GRAALVM_QUICK_BUILD: true
          NATIVE_IMAGE_OPTIONS: "-H:+ReportExceptionStackTraces"
        with:
          nativeTestTask: ${{ matrix.native_test_task }}
      - name: Post-Build Steps
        uses: micronaut-projects/github-actions/graalvm/post-build@e8cc2858e07f25cd86910b691ad09eb0d7f07f56 # master
        id: post-build
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.GRADLE_ENTERPRISE_ACCESS_KEY }}
          DEVELOCITY_CACHE_USERNAME: ${{ secrets.GRADLE_ENTERPRISE_CACHE_USERNAME }}
          DEVELOCITY_CACHE_PASSWORD: ${{ secrets.GRADLE_ENTERPRISE_CACHE_PASSWORD }}
        with:
          java: ${{ matrix.java }}
