# WARNING: Do not edit this file directly. Instead, go to:
#
# https://github.com/micronaut-projects/micronaut-project-template/tree/master/.github/workflows
#
# and edit them there. Note that it will be sync'ed to all the Micronaut repos
name: Update Skills
on:
  schedule:
    - cron: '0 4 * * MON'
  workflow_dispatch:
jobs:
  update-skills:
    if: github.repository == 'micronaut-projects/micronaut-project-template'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
      - name: Update local skills
        run: npx skills update
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: Update local skills
          title: Update local skills
          body: |
            Weekly automated update of local skills via `npx skills update`.
          branch: automation/update-local-skills
          delete-branch: true
          reviewers: alvarosanchez
          add-paths: |
            .agents/skills/**
            skills-lock.json
