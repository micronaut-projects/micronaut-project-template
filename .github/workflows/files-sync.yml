name: Files sync
on:
  schedule:
    - cron: '0 5 * * *'
jobs:
  sync-files:
    if: github.repository == 'micronaut-projects/micronaut-project-template'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        repo:
          - acme
          - aot
          - avro
          - aws
          - azure
          - build-plugin-sourcegen
          - cache
          - cassandra
          - chatbots
          - coherence
          - control-panel
          - core
          - crac
          - data
          - discovery-client
          - eclipsestore
          - elasticsearch
          - email
          - flyway
          - fuzzing
          - gcp
          - graphql
          - groovy
          - graal-languages
          - grpc
          - guice
          - hibernate-validator
          - jackson-xml
          - jaxrs
          - jms
          - jmx
          - json-schema
          - kafka
          - kotlin
          - kubernetes
          - langchain4j
          - liquibase
          - logging
          - mcp
          - micrometer
          - mongodb
          - mqtt
          - multitenancy
          - nats
          - neo4j
          - object-storage
          - openapi
          - openrewrite
          - opensearch
          - oracle-cloud
          - picocli
          - platform
          - problem-json
          - projectgen
          - pulsar
          - r2dbc
          - rabbitmq
          - reactor
          - redis
          - rss
          - rxjava3
          - security
          - serialization
          - servlet
          - session
          - sourcegen
          - spring
          - sql
          - test
          - test-resources
          - toml
          - tracing
          - validation
          - views
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          path: source
      - name: Checkout target - default branch
        uses: actions/checkout@v6
        with:
          repository: micronaut-projects/micronaut-${{ matrix.repo }}
          path: target
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
      - name: Determine current branch
        id: branch
        working-directory: target
        run: |
          branch=$(git rev-parse --abbrev-ref HEAD)
          echo "Current branch: ${branch}"
          echo "branch=${branch}" >> $GITHUB_OUTPUT
      - name: Sync workflows
        run: |
          mkdir -p target/.github/workflows/
          rsync --verbose --verbose  --archive -F "source/.github/workflows/" "target/.github/workflows/"
          rm -f target/.github/dependabot.yml
          rm -f target/.github/stale.yml
          rm -f target/.github/release-drafter.yml
          rm -f target/.github/workflows/release-notes.yml
          rm -f target/.github/workflows/dependency-update.yml
          rm -f target/.github/workflows/sonarqube.yml
      - name: Copy files from source to target branches
        run: |
          while IFS= read -r file; do
              dest_dirname="$(dirname $file)"
              dest_filename="$(basename $file)"
              mkdir -p target/$dest_dirname
              [ ! -f target/${dest_dirname}/${dest_filename}.lock ] && cp source/$file target/${dest_dirname}/${dest_filename}
          done <<< "$FILES"
        env:
          FILES: |-
            .clineignore
            .editorconfig
            .gitattributes
            .gitignore
            .github/renovate.json
            .github/release.yml
            .github/ISSUE_TEMPLATE/bug_report.yaml
            .github/ISSUE_TEMPLATE/config.yml
            .github/ISSUE_TEMPLATE/new_feature.yaml
            .github/ISSUE_TEMPLATE/other.yaml
            .sdkmanrc
            gradle/wrapper/gradle-wrapper.jar
            gradle/wrapper/gradle-wrapper.properties
            gradlew
            gradlew.bat
            CONTRIBUTING.md
            MAINTAINING.md
            SECURITY.md
            LICENSE
            config/HEADER
            config/spotless.license.java
            config/checkstyle/checkstyle.xml
            config/checkstyle/suppressions.xml
      - name: Copy all skills from source to target branches
        run: |
          rsync_args=(-a --delete --exclude='*.lock')
          if [ -d "target/.agents/skills" ]; then
              while IFS= read -r -d '' lock_file; do
                  skill_file="${lock_file%.lock}"
                  rel="${skill_file#target/.agents/skills/}"
                  rsync_args+=(--exclude="$rel")
              done < <(find "target/.agents/skills" -name "*.lock" -print0)
          fi
          mkdir -p target/.agents/skills
          rsync "${rsync_args[@]}" source/.agents/skills/ target/.agents/skills/
      - name: Sync global CONTRIBUTING section
        run: |
          python3 - <<'PY'
          from pathlib import Path

          source_root = Path('source')
          target_root = Path('target')
          target_file = target_root / 'CONTRIBUTING.md'
          global_file = source_root / 'GLOBAL_CONTRIBUTING.md'
          start_marker = '<!-- BEGIN MICRONAUT GLOBAL CONTRIBUTING: Managed by micronaut-project-template/GLOBAL_CONTRIBUTING.md. Do not add or modify content below this marker in this file; your changes will be replaced by the sync workflow. -->'
          end_marker = '<!-- END MICRONAUT GLOBAL CONTRIBUTING -->'
          newline = chr(10)

          managed_block = global_file.read_text()
          if not managed_block.endswith(newline):
              managed_block += newline

          if target_file.exists():
              target_text = target_file.read_text()
          else:
              target_text = ''

          start_index = target_text.find(start_marker)
          end_index = target_text.find(end_marker)

          if start_index != -1 and end_index != -1 and end_index >= start_index:
              end_index += len(end_marker)
              if end_index < len(target_text) and target_text[end_index:end_index + 1] == newline:
                  end_index += 1
              updated = target_text[:start_index].rstrip() + newline + newline + managed_block
          else:
              prefix = target_text.rstrip()
              if prefix:
                  updated = prefix + newline + newline + managed_block
              else:
                  updated = managed_block

          if not updated.endswith(newline):
              updated += newline

          target_file.write_text(updated)
          PY
      - name: Sleep for 3 minutes to avoid rate limiting
        run: sleep 180s
        shell: bash
      - name: Create Pull Request - ${{ steps.branch.outputs.branch }}
        uses: peter-evans/create-pull-request@v8
        with:
          path: target
          token: ${{ secrets.GH_TOKEN }}
          committer: micronaut-build <${{ secrets.MICRONAUT_BUILD_EMAIL }}>
          author: micronaut-build <${{ secrets.MICRONAUT_BUILD_EMAIL }}>
          commit-message: Update common files
          title: "[${{ matrix.repo }}] Update common files for branch ${{ steps.branch.outputs.branch }}"
          body: Update common files
          labels: "relates-to: build"
          branch: sync-files-${{ steps.branch.outputs.branch }}
          base: ${{ steps.branch.outputs.branch }}
          add-paths: |
            .clineignore
            .editorconfig
            .gitattributes
            .gitignore
            .agents/skills
            .github/*
            .github/ISSUE_TEMPLATE/*
            .github/workflows/*
            .sdkmanrc
            gradle/*
            gradlew*
            CONTRIBUTING.md
            MAINTAINING.md
            SECURITY.md
            LICENSE
            config/HEADER
            config/spotless.license.java
            config/checkstyle/checkstyle.xml
            config/checkstyle/suppressions.xml
