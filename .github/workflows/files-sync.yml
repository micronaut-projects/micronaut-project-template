name: Files sync
on:
  workflow_dispatch:
    inputs:
      project_slug:
        description: 'Project slug without the micronaut- prefix. Leave empty to sync every project.'
        required: false
        type: string
  schedule:
    - cron: '0 5 * * *'
jobs:
  prepare-matrix:
    if: github.repository == 'micronaut-projects/micronaut-project-template'
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.prepare.outputs.repos }}
    steps:
      - name: Prepare repository matrix
        id: prepare
        shell: bash
        run: |
          repos=(
            acme
            aot
            avro
            aws
            azure
            build-plugin-sourcegen
            cache
            cassandra
            chatbots
            coherence
            control-panel
            core
            crac
            data
            discovery-client
            eclipsestore
            elasticsearch
            email
            flyway
            fuzzing
            gcp
            graphql
            groovy
            graal-languages
            grpc
            guice
            hibernate-validator
            jackson-xml
            jaxrs
            jms
            jmx
            json-schema
            kafka
            kotlin
            kubernetes
            langchain4j
            liquibase
            logging
            mcp
            micrometer
            mongodb
            mqtt
            multitenancy
            nats
            neo4j
            object-storage
            openapi
            openrewrite
            opensearch
            oracle-cloud
            picocli
            platform
            problem-json
            projectgen
            pulsar
            r2dbc
            rabbitmq
            reactor
            redis
            rss
            rxjava3
            security
            serialization
            servlet
            session
            sourcegen
            spring
            sql
            test
            test-resources
            toml
            tracing
            validation
            views
          )

          slug="${{ github.event.inputs.project_slug }}"

          if [ -n "${slug}" ]; then
            for repo in "${repos[@]}"; do
              if [ "${repo}" = "${slug}" ]; then
                printf 'repos=["%s"]\n' "${slug}" >> "${GITHUB_OUTPUT}"
                exit 0
              fi
            done

            echo "Unknown project slug: ${slug}" >&2
            exit 1
          fi

          json="["
          for repo in "${repos[@]}"; do
            if [ "${json}" != "[" ]; then
              json+=","
            fi
            json+="\"${repo}\""
          done
          json+="]"

          echo "repos=${json}" >> "${GITHUB_OUTPUT}"

  merge-existing-sync-pull-requests:
    needs: prepare-matrix
    if: github.repository == 'micronaut-projects/micronaut-project-template'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        repo: ${{ fromJson(needs.prepare-matrix.outputs.repos) }}
    steps:
      - name: Merge existing green sync pull request
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPOSITORY: micronaut-projects/micronaut-${{ matrix.repo }}
          REPO_SLUG: ${{ matrix.repo }}
        run: |
          default_branch="$(gh repo view "${REPOSITORY}" --json defaultBranchRef --jq '.defaultBranchRef.name')"
          sync_branch="sync-files-${default_branch}"
          sync_title="[${REPO_SLUG}] Update common files for branch ${default_branch}"

          prs_json="$(gh pr list \
            --repo "${REPOSITORY}" \
            --state open \
            --base "${default_branch}" \
            --head "${sync_branch}" \
            --json number,title,baseRefName,headRefName \
            --limit 20)"

          matching_prs="$(jq \
            --arg title "${sync_title}" \
            --arg base "${default_branch}" \
            --arg head "${sync_branch}" \
            '[.[] | select(.title == $title and .baseRefName == $base and .headRefName == $head)]' \
            <<< "${prs_json}")"
          match_count="$(jq 'length' <<< "${matching_prs}")"

          if [ "${match_count}" -eq 0 ]; then
            echo "No open sync pull request found for ${REPOSITORY} ${sync_branch}."
            exit 0
          fi

          if [ "${match_count}" -gt 1 ]; then
            echo "Found ${match_count} matching sync pull requests for ${REPOSITORY}; skipping ambiguous merge."
            exit 0
          fi

          pr_number="$(jq -r '.[0].number' <<< "${matching_prs}")"
          pr_json="$(gh pr view "${pr_number}" \
            --repo "${REPOSITORY}" \
            --json number,url,isDraft,headRefOid,mergeable,mergeStateStatus,statusCheckRollup,title,baseRefName,headRefName)"

          pr_url="$(jq -r '.url' <<< "${pr_json}")"
          head_sha="$(jq -r '.headRefOid' <<< "${pr_json}")"
          is_draft="$(jq -r '.isDraft' <<< "${pr_json}")"
          mergeable="$(jq -r '.mergeable' <<< "${pr_json}")"
          merge_state="$(jq -r '.mergeStateStatus' <<< "${pr_json}")"
          check_count="$(jq '.statusCheckRollup | length' <<< "${pr_json}")"
          failing_checks="$(jq '
            [
              .statusCheckRollup[]
              | select(
                  (
                    .__typename == "CheckRun"
                    and (
                      .status != "COMPLETED"
                      or (.conclusion | IN("SUCCESS", "SKIPPED", "NEUTRAL") | not)
                    )
                  )
                  or
                  (
                    .__typename == "StatusContext"
                    and .state != "SUCCESS"
                  )
                  or
                  (
                    (.__typename | IN("CheckRun", "StatusContext") | not)
                  )
                )
            ]
            | length
          ' <<< "${pr_json}")"

          if [ "${is_draft}" = "true" ]; then
            echo "Skipping draft sync pull request ${pr_url}."
            exit 0
          fi

          if [ "${check_count}" -eq 0 ]; then
            echo "Skipping ${pr_url} because it has no status checks."
            exit 0
          fi

          if [ "${failing_checks}" -ne 0 ]; then
            echo "Skipping ${pr_url} because not all status checks are green."
            exit 0
          fi

          if [ "${mergeable}" != "MERGEABLE" ] || [ "${merge_state}" != "CLEAN" ]; then
            echo "Skipping ${pr_url} because mergeable=${mergeable} and mergeStateStatus=${merge_state}."
            exit 0
          fi

          repo_json="$(gh repo view "${REPOSITORY}" --json mergeCommitAllowed,squashMergeAllowed,rebaseMergeAllowed)"
          merge_args=()
          if [ "$(jq -r '.mergeCommitAllowed' <<< "${repo_json}")" = "true" ]; then
            merge_args+=(--merge)
          elif [ "$(jq -r '.squashMergeAllowed' <<< "${repo_json}")" = "true" ]; then
            merge_args+=(--squash)
          elif [ "$(jq -r '.rebaseMergeAllowed' <<< "${repo_json}")" = "true" ]; then
            merge_args+=(--rebase)
          else
            echo "Skipping ${pr_url} because no supported merge method is enabled."
            exit 0
          fi

          if gh pr merge "${pr_number}" \
            --repo "${REPOSITORY}" \
            "${merge_args[@]}" \
            --match-head-commit "${head_sha}" \
            --delete-branch; then
            echo "Merged existing green sync pull request ${pr_url}."
          else
            echo "Unable to merge ${pr_url}; it may have changed after inspection."
          fi

  sync-files:
    needs:
      - prepare-matrix
      - merge-existing-sync-pull-requests
    if: github.repository == 'micronaut-projects/micronaut-project-template'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        repo: ${{ fromJson(needs.prepare-matrix.outputs.repos) }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          path: source
      - name: Checkout target - default branch
        uses: actions/checkout@v6
        with:
          repository: micronaut-projects/micronaut-${{ matrix.repo }}
          path: target
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
      - name: Determine current branch
        id: branch
        working-directory: target
        run: |
          branch=$(git rev-parse --abbrev-ref HEAD)
          echo "Current branch: ${branch}"
          echo "branch=${branch}" >> $GITHUB_OUTPUT
      - name: Sync workflows
        run: |
          mkdir -p target/.github/workflows/
          rsync --verbose --verbose  --archive -F "source/.github/workflows/" "target/.github/workflows/"
          rm -f target/.github/dependabot.yml
          rm -f target/.github/stale.yml
          rm -f target/.github/release-drafter.yml
          rm -f target/.github/workflows/release-notes.yml
          rm -f target/.github/workflows/dependency-update.yml
          rm -f target/.github/workflows/sonarqube.yml
      - name: Copy files from source to target branches
        run: |
          while IFS= read -r file; do
              dest_dirname="$(dirname $file)"
              dest_filename="$(basename $file)"
              mkdir -p target/$dest_dirname
              [ ! -f target/${dest_dirname}/${dest_filename}.lock ] && cp source/$file target/${dest_dirname}/${dest_filename}
          done <<< "$FILES"
        env:
          FILES: |-
            .clineignore
            .editorconfig
            .gitattributes
            .gitignore
            .github/renovate.json
            .github/release.yml
            .github/ISSUE_TEMPLATE/bug_report.yaml
            .github/ISSUE_TEMPLATE/config.yml
            .github/ISSUE_TEMPLATE/new_feature.yaml
            .github/ISSUE_TEMPLATE/other.yaml
            .sdkmanrc
            gradle/wrapper/gradle-wrapper.jar
            gradle/wrapper/gradle-wrapper.properties
            gradlew
            gradlew.bat
            MAINTAINING.md
            SECURITY.md
            LICENSE
            config/HEADER
            config/spotless.license.java
            config/checkstyle/checkstyle.xml
            config/checkstyle/suppressions.xml
      - name: Copy all skills from source to target branches
        run: |
          rsync_args=(-a --delete --exclude='*.lock')
          if [ -d "target/.agents/skills" ]; then
              while IFS= read -r -d '' lock_file; do
                  skill_file="${lock_file%.lock}"
                  rel="${skill_file#target/.agents/skills/}"
                  rsync_args+=(--exclude="$rel")
              done < <(find "target/.agents/skills" -name "*.lock" -print0)
          fi
          mkdir -p target/.agents/skills
          rsync "${rsync_args[@]}" source/.agents/skills/ target/.agents/skills/
      - name: Sleep for 3 minutes to avoid rate limiting
        run: sleep 180s
        shell: bash
      - name: Create Pull Request - ${{ steps.branch.outputs.branch }}
        uses: peter-evans/create-pull-request@v8
        with:
          path: target
          token: ${{ secrets.GH_TOKEN }}
          committer: micronaut-build <${{ secrets.MICRONAUT_BUILD_EMAIL }}>
          author: micronaut-build <${{ secrets.MICRONAUT_BUILD_EMAIL }}>
          commit-message: Update common files
          title: "[${{ matrix.repo }}] Update common files for branch ${{ steps.branch.outputs.branch }}"
          body: Update common files
          labels: "relates-to: build"
          branch: sync-files-${{ steps.branch.outputs.branch }}
          base: ${{ steps.branch.outputs.branch }}
          add-paths: |
            .clineignore
            .editorconfig
            .gitattributes
            .gitignore
            .agents/skills
            .github/*
            .github/ISSUE_TEMPLATE/*
            .github/workflows/*
            .sdkmanrc
            gradle/*
            gradlew*
            MAINTAINING.md
            SECURITY.md
            LICENSE
            config/HEADER
            config/spotless.license.java
            config/checkstyle/checkstyle.xml
            config/checkstyle/suppressions.xml
